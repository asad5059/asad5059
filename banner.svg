<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes barGrow {
        from { width: 0px; }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .t1 { animation: fadeInUp 0.6s 0.1s both; }
      .t2 { animation: fadeInUp 0.6s 0.3s both; }
      .t3 { animation: fadeInUp 0.6s 0.5s both; }
      .t4 { animation: fadeInUp 0.6s 0.7s both; }
      .cursor { animation: blink 0.9s step-end infinite; }
      .b1 { animation: barGrow 1.2s 0.8s cubic-bezier(.4,0,.2,1) both; }
      .b2 { animation: barGrow 1.2s 1.0s cubic-bezier(.4,0,.2,1) both; }
      .b3 { animation: barGrow 1.2s 1.2s cubic-bezier(.4,0,.2,1) both; }
      .b4 { animation: barGrow 1.2s 1.4s cubic-bezier(.4,0,.2,1) both; }
      .tag1 { animation: slideIn 0.5s 1.1s both; }
      .tag2 { animation: slideIn 0.5s 1.22s both; }
      .tag3 { animation: slideIn 0.5s 1.34s both; }
      .tag4 { animation: slideIn 0.5s 1.46s both; }
      .tag5 { animation: slideIn 0.5s 1.58s both; }
      .tag6 { animation: slideIn 0.5s 1.70s both; }
      .tag7 { animation: slideIn 0.5s 1.82s both; }
    </style>
  </defs>

  <rect width="800" height="200" rx="12" fill="#0d1117"/>
  <line x1="410" y1="20" x2="410" y2="180" stroke="#30363d" stroke-width="0.5" opacity="0.6"/>

  <!-- LEFT SIDE -->
  <g class="t1">
    <text x="28" y="50" font-family="monospace" font-size="20" font-weight="bold" fill="#e6edf3">Mosleh Uddin Asad</text>
    <rect x="244" y="33" width="9" height="16" rx="1" fill="#58a6ff" class="cursor"/>
  </g>
  <g class="t2">
    <text x="28" y="68" font-family="monospace" font-size="9.5" fill="#8b949e">Software Engineer · Full-Stack · AI Enthusiast · CP</text>
  </g>
  <line x1="28" y1="78" x2="390" y2="78" stroke="#30363d" stroke-width="0.5" class="t2"/>

  <g class="t3">
    <text x="28" y="94" font-family="monospace" font-size="9.5" fill="#8b949e">Backend </text>
    <rect x="86" y="87" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="87" width="98" height="5" rx="2.5" fill="#1f6feb" class="b1"/>

    <text x="28" y="110" font-family="monospace" font-size="9.5" fill="#8b949e">Frontend</text>
    <rect x="86" y="103" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="103" width="80" height="5" rx="2.5" fill="#388bfd" class="b2"/>

    <text x="28" y="126" font-family="monospace" font-size="9.5" fill="#8b949e">CP / Algo</text>
    <rect x="86" y="119" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="119" width="65" height="5" rx="2.5" fill="#58a6ff" class="b3"/>

    <text x="28" y="142" font-family="monospace" font-size="9.5" fill="#8b949e">AI / LLMs</text>
    <rect x="86" y="135" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="135" width="50" height="5" rx="2.5" fill="#7c3aed" class="b4"/>
  </g>

  <g class="t4">
    <g class="tag1">
      <rect x="28" y="156" width="58" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="57" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">Django</text>
    </g>
    <g class="tag2">
      <rect x="92" y="156" width="40" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="112" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">React</text>
    </g>
    <g class="tag3">
      <rect x="138" y="156" width="56" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="166" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">Supabase</text>
    </g>
    <g class="tag4">
      <rect x="200" y="156" width="46" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="223" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">Tailwind</text>
    </g>
    <g class="tag5">
      <rect x="252" y="156" width="30" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="267" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">C++</text>
    </g>
    <g class="tag6">
      <rect x="288" y="156" width="30" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="303" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">Bash</text>
    </g>
    <g class="tag7">
      <rect x="324" y="156" width="28" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="338" y="169" font-family="monospace" font-size="9" fill="#79c0ff" text-anchor="middle">Git</text>
    </g>
  </g>

  <!-- RIGHT SIDE -->
  <g class="t4">
    <rect x="422" y="22" width="358" height="158" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="440" cy="37" r="4.5" fill="#ff5f57"/>
    <circle cx="454" cy="37" r="4.5" fill="#febc2e"/>
    <circle cx="468" cy="37" r="4.5" fill="#28c840"/>
    <line x1="422" y1="47" x2="780" y2="47" stroke="#30363d" stroke-width="0.5"/>

    <text x="438" y="65" font-family="monospace" font-size="10" fill="#8b949e">class </text>
    <text x="472" y="65" font-family="monospace" font-size="10" fill="#79c0ff">Engineer</text>
    <text x="524" y="65" font-family="monospace" font-size="10" fill="#e6edf3">:</text>

    <text x="438" y="82" font-family="monospace" font-size="10" fill="#8b949e">  stack </text>
    <text x="480" y="82" font-family="monospace" font-size="10" fill="#e6edf3">= [</text>
    <text x="498" y="82" font-family="monospace" font-size="10" fill="#a5d6ff">"Django"</text>
    <text x="550" y="82" font-family="monospace" font-size="10" fill="#e6edf3">, </text>
    <text x="561" y="82" font-family="monospace" font-size="10" fill="#a5d6ff">"React"</text>
    <text x="603" y="82" font-family="monospace" font-size="10" fill="#e6edf3">]</text>

    <text x="438" y="99" font-family="monospace" font-size="10" fill="#8b949e">  db    </text>
    <text x="480" y="99" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="492" y="99" font-family="monospace" font-size="10" fill="#a5d6ff">"PostgreSQL · Supabase"</text>

    <text x="438" y="116" font-family="monospace" font-size="10" fill="#8b949e">  ai    </text>
    <text x="480" y="116" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="492" y="116" font-family="monospace" font-size="10" fill="#d2a8ff">"LLMs · Agents · RAG"</text>

    <text x="438" y="133" font-family="monospace" font-size="10" fill="#8b949e">  cp    </text>
    <text x="480" y="133" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="492" y="133" font-family="monospace" font-size="10" fill="#a5d6ff">"Codeforces · LeetCode"</text>

    <text x="438" y="150" font-family="monospace" font-size="10" fill="#8b949e">  loc   </text>
    <text x="480" y="150" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="492" y="150" font-family="monospace" font-size="10" fill="#a5d6ff">"Dhaka, BD"</text>

    <text x="438" y="167" font-family="monospace" font-size="10" fill="#8b949e">  open  </text>
    <text x="480" y="167" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="492" y="167" font-family="monospace" font-size="10" fill="#a5d6ff">"new roles "</text>
    <rect x="542" y="157" width="7" height="11" rx="1" fill="#58a6ff" class="cursor"/>
  </g>
</svg>
