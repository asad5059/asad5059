<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes barGrow {
        from { width: 0px; }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .t1 { animation: fadeInUp 0.6s 0.1s both; }
      .t2 { animation: fadeInUp 0.6s 0.3s both; }
      .t3 { animation: fadeInUp 0.6s 0.5s both; }
      .t4 { animation: fadeInUp 0.6s 0.7s both; }
      .cursor { animation: blink 0.9s step-end infinite; }
      .b1 { animation: barGrow 1.2s 0.8s cubic-bezier(.4,0,.2,1) both; }
      .b2 { animation: barGrow 1.2s 1.0s cubic-bezier(.4,0,.2,1) both; }
      .b3 { animation: barGrow 1.2s 1.2s cubic-bezier(.4,0,.2,1) both; }
      .b4 { animation: barGrow 1.2s 1.4s cubic-bezier(.4,0,.2,1) both; }
      .r1  { animation: slideIn 0.4s 1.10s both; }
      .r2  { animation: slideIn 0.4s 1.20s both; }
      .r3  { animation: slideIn 0.4s 1.30s both; }
      .r4  { animation: slideIn 0.4s 1.40s both; }
      .r5  { animation: slideIn 0.4s 1.50s both; }
      .r6  { animation: slideIn 0.4s 1.60s both; }
      .r7  { animation: slideIn 0.4s 1.70s both; }
      .r8  { animation: slideIn 0.4s 1.80s both; }
      .r9  { animation: slideIn 0.4s 1.90s both; }
    </style>
  </defs>

  <rect width="800" height="220" rx="12" fill="#0d1117"/>
  <line x1="410" y1="20" x2="410" y2="200" stroke="#30363d" stroke-width="0.5" opacity="0.6"/>

  <!-- LEFT SIDE -->
  <g class="t1">
    <text x="28" y="50" font-family="monospace" font-size="20" font-weight="bold" fill="#e6edf3">Mosleh Uddin Asad</text>
    <rect x="244" y="33" width="9" height="16" rx="1" fill="#58a6ff" class="cursor"/>
  </g>
  <g class="t2">
    <text x="28" y="68" font-family="monospace" font-size="9.5" fill="#8b949e">Software Engineer · Full-Stack · AI Enthusiast · CP</text>
  </g>
  <line x1="28" y1="78" x2="390" y2="78" stroke="#30363d" stroke-width="0.5" class="t2"/>

  <!-- Skill bars -->
  <g class="t3">
    <text x="28" y="94"  font-family="monospace" font-size="9.5" fill="#8b949e">Backend </text>
    <rect x="86" y="87"  width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="87"  width="98"  height="5" rx="2.5" fill="#1f6feb" class="b1"/>

    <text x="28" y="110" font-family="monospace" font-size="9.5" fill="#8b949e">Frontend</text>
    <rect x="86" y="103" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="103" width="80"  height="5" rx="2.5" fill="#388bfd" class="b2"/>

    <text x="28" y="126" font-family="monospace" font-size="9.5" fill="#8b949e">CP / Algo</text>
    <rect x="86" y="119" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="119" width="65"  height="5" rx="2.5" fill="#58a6ff" class="b3"/>

    <text x="28" y="142" font-family="monospace" font-size="9.5" fill="#8b949e">AI / LLMs</text>
    <rect x="86" y="135" width="110" height="5" rx="2.5" fill="#21262d"/>
    <rect x="86" y="135" width="50"  height="5" rx="2.5" fill="#7c3aed" class="b4"/>
  </g>

  <!-- Tags: row 1 -->
  <g class="t4">
    <g class="r1">
      <rect x="28"  y="155" width="50" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="53"  y="167" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">Django</text>
    </g>
    <g class="r2">
      <rect x="83"  y="155" width="38" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="102" y="167" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">React</text>
    </g>
    <g class="r3">
      <rect x="126" y="155" width="54" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="153" y="167" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">Supabase</text>
    </g>
    <g class="r4">
      <rect x="185" y="155" width="46" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="208" y="167" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">Tailwind</text>
    </g>
    <g class="r5">
      <rect x="236" y="155" width="30" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="251" y="167" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">C++</text>
    </g>
  </g>

  <!-- Tags: row 2 -->
  <g class="t4">
    <g class="r6">
      <rect x="28"  y="177" width="68" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="62"  y="189" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">SQLAlchemy</text>
    </g>
    <g class="r7">
      <rect x="101" y="177" width="46" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="124" y="189" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">Alembic</text>
    </g>
    <g class="r8">
      <rect x="152" y="177" width="32" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="168" y="189" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">Bash</text>
    </g>
    <g class="r9">
      <rect x="189" y="177" width="26" height="17" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="202" y="189" font-family="monospace" font-size="8.5" fill="#79c0ff" text-anchor="middle">Git</text>
    </g>
  </g>

  <!-- RIGHT SIDE -->
  <g class="t4">
    <rect x="422" y="22" width="358" height="178" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <circle cx="440" cy="37" r="4.5" fill="#ff5f57"/>
    <circle cx="454" cy="37" r="4.5" fill="#febc2e"/>
    <circle cx="468" cy="37" r="4.5" fill="#28c840"/>
    <line x1="422" y1="47" x2="780" y2="47" stroke="#30363d" stroke-width="0.5"/>

    <text x="438" y="66"  font-family="monospace" font-size="10" fill="#8b949e">class </text>
    <text x="472" y="66"  font-family="monospace" font-size="10" fill="#79c0ff">Engineer</text>
    <text x="524" y="66"  font-family="monospace" font-size="10" fill="#e6edf3">:</text>

    <text x="438" y="83"  font-family="monospace" font-size="10" fill="#8b949e">  stack  </text>
    <text x="483" y="83"  font-family="monospace" font-size="10" fill="#e6edf3">= [</text>
    <text x="501" y="83"  font-family="monospace" font-size="10" fill="#a5d6ff">"Django"</text>
    <text x="553" y="83"  font-family="monospace" font-size="10" fill="#e6edf3">, </text>
    <text x="564" y="83"  font-family="monospace" font-size="10" fill="#a5d6ff">"React"</text>
    <text x="606" y="83"  font-family="monospace" font-size="10" fill="#e6edf3">]</text>

    <text x="438" y="100" font-family="monospace" font-size="10" fill="#8b949e">  db     </text>
    <text x="483" y="100" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="495" y="100" font-family="monospace" font-size="10" fill="#a5d6ff">"Postgres · Supabase · MySQL"</text>

    <text x="438" y="117" font-family="monospace" font-size="10" fill="#8b949e">  orm    </text>
    <text x="483" y="117" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="495" y="117" font-family="monospace" font-size="10" fill="#a5d6ff">"SQLAlchemy · Alembic"</text>

    <text x="438" y="134" font-family="monospace" font-size="10" fill="#8b949e">  ai     </text>
    <text x="483" y="134" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="495" y="134" font-family="monospace" font-size="10" fill="#d2a8ff">"LLMs · Agents · RAG"</text>

    <text x="438" y="151" font-family="monospace" font-size="10" fill="#8b949e">  cp     </text>
    <text x="483" y="151" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="495" y="151" font-family="monospace" font-size="10" fill="#a5d6ff">"Codeforces · LeetCode"</text>

    <text x="438" y="168" font-family="monospace" font-size="10" fill="#8b949e">  loc    </text>
    <text x="483" y="168" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="495" y="168" font-family="monospace" font-size="10" fill="#a5d6ff">"Dhaka, Bangladesh"</text>

    <text x="438" y="185" font-family="monospace" font-size="10" fill="#8b949e">  open   </text>
    <text x="483" y="185" font-family="monospace" font-size="10" fill="#e6edf3">= </text>
    <text x="495" y="185" font-family="monospace" font-size="10" fill="#a5d6ff">"new roles"</text>
    <rect x="545" y="175" width="7" height="11" rx="1" fill="#58a6ff" class="cursor"/>
  </g>
</svg>
