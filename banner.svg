<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes barGrow {
        from { width: 0px; }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .t1 { animation: fadeInUp 0.6s 0.1s both; }
      .t2 { animation: fadeInUp 0.6s 0.3s both; }
      .t3 { animation: fadeInUp 0.6s 0.5s both; }
      .t4 { animation: fadeInUp 0.6s 0.7s both; }
      .cursor { animation: blink 0.9s step-end infinite; }
      .b1 { animation: barGrow 1.2s 0.8s cubic-bezier(.4,0,.2,1) both; }
      .b2 { animation: barGrow 1.2s 1.0s cubic-bezier(.4,0,.2,1) both; }
      .b3 { animation: barGrow 1.2s 1.2s cubic-bezier(.4,0,.2,1) both; }
      .tag1 { animation: slideIn 0.5s 1.1s both; }
      .tag2 { animation: slideIn 0.5s 1.25s both; }
      .tag3 { animation: slideIn 0.5s 1.4s both; }
      .tag4 { animation: slideIn 0.5s 1.55s both; }
      .tag5 { animation: slideIn 0.5s 1.7s both; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#0d1117"/>

  <!-- Subtle vertical divider -->
  <line x1="410" y1="20" x2="410" y2="180" stroke="#30363d" stroke-width="0.5" opacity="0.6"/>

  <!-- ===== LEFT SIDE (0–400) ===== -->

  <!-- Name -->
  <g class="t1">
    <text x="28" y="52" font-family="monospace" font-size="20" font-weight="bold" fill="#e6edf3">Mosleh Uddin Asad</text>
    <rect x="244" y="35" width="9" height="16" rx="1" fill="#58a6ff" class="cursor"/>
  </g>

  <!-- Role -->
  <g class="t2">
    <text x="28" y="72" font-family="monospace" font-size="10" fill="#8b949e">Software Engineer · Full-Stack · CP</text>
  </g>

  <!-- Divider line -->
  <line x1="28" y1="82" x2="390" y2="82" stroke="#30363d" stroke-width="0.5" class="t2"/>

  <!-- Skill bars -->
  <g class="t3">
    <!-- Backend -->
    <text x="28" y="100" font-family="monospace" font-size="10" fill="#8b949e">Backend </text>
    <rect x="90" y="93" width="120" height="5" rx="2.5" fill="#21262d"/>
    <rect x="90" y="93" width="105" height="5" rx="2.5" fill="#1f6feb" class="b1"/>

    <!-- Frontend -->
    <text x="28" y="118" font-family="monospace" font-size="10" fill="#8b949e">Frontend</text>
    <rect x="90" y="111" width="120" height="5" rx="2.5" fill="#21262d"/>
    <rect x="90" y="111" width="88" height="5" rx="2.5" fill="#388bfd" class="b2"/>

    <!-- CP -->
    <text x="28" y="136" font-family="monospace" font-size="10" fill="#8b949e">CP / Algo</text>
    <rect x="90" y="129" width="120" height="5" rx="2.5" fill="#21262d"/>
    <rect x="90" y="129" width="70" height="5" rx="2.5" fill="#58a6ff" class="b3"/>
  </g>

  <!-- Tech tags -->
  <g class="t4">
    <g class="tag1">
      <rect x="28" y="152" width="70" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="63" y="166" font-family="monospace" font-size="9.5" fill="#79c0ff" text-anchor="middle">Django · DRF</text>
    </g>
    <g class="tag2">
      <rect x="104" y="152" width="44" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="126" y="166" font-family="monospace" font-size="9.5" fill="#79c0ff" text-anchor="middle">React</text>
    </g>
    <g class="tag3">
      <rect x="154" y="152" width="64" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="186" y="166" font-family="monospace" font-size="9.5" fill="#79c0ff" text-anchor="middle">PostgreSQL</text>
    </g>
    <g class="tag4">
      <rect x="224" y="152" width="34" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="241" y="166" font-family="monospace" font-size="9.5" fill="#79c0ff" text-anchor="middle">C++</text>
    </g>
    <g class="tag5">
      <rect x="264" y="152" width="32" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
      <text x="280" y="166" font-family="monospace" font-size="9.5" fill="#79c0ff" text-anchor="middle">Git</text>
    </g>
  </g>

  <!-- ===== RIGHT SIDE (420–790) ===== -->
  <g class="t4">
    <!-- Code card background -->
    <rect x="422" y="22" width="358" height="158" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>

    <!-- Traffic light dots -->
    <circle cx="440" cy="38" r="4.5" fill="#ff5f57"/>
    <circle cx="454" cy="38" r="4.5" fill="#febc2e"/>
    <circle cx="468" cy="38" r="4.5" fill="#28c840"/>

    <!-- Top bar separator -->
    <line x1="422" y1="48" x2="780" y2="48" stroke="#30363d" stroke-width="0.5"/>

    <!-- Code lines — all start at x=438, carefully measured -->
    <text x="438" y="66" font-family="monospace" font-size="10.5" fill="#8b949e">class </text>
    <text x="475" y="66" font-family="monospace" font-size="10.5" fill="#79c0ff">Engineer</text>
    <text x="530" y="66" font-family="monospace" font-size="10.5" fill="#e6edf3">:</text>

    <text x="438" y="84" font-family="monospace" font-size="10.5" fill="#8b949e">  stack </text>
    <text x="484" y="84" font-family="monospace" font-size="10.5" fill="#e6edf3">= [</text>
    <text x="504" y="84" font-family="monospace" font-size="10.5" fill="#a5d6ff">"Django"</text>
    <text x="560" y="84" font-family="monospace" font-size="10.5" fill="#e6edf3">, </text>
    <text x="572" y="84" font-family="monospace" font-size="10.5" fill="#a5d6ff">"React"</text>
    <text x="616" y="84" font-family="monospace" font-size="10.5" fill="#e6edf3">]</text>

    <text x="438" y="102" font-family="monospace" font-size="10.5" fill="#8b949e">  db    </text>
    <text x="484" y="102" font-family="monospace" font-size="10.5" fill="#e6edf3">= </text>
    <text x="496" y="102" font-family="monospace" font-size="10.5" fill="#a5d6ff">"PostgreSQL"</text>

    <text x="438" y="120" font-family="monospace" font-size="10.5" fill="#8b949e">  cp    </text>
    <text x="484" y="120" font-family="monospace" font-size="10.5" fill="#e6edf3">= </text>
    <text x="496" y="120" font-family="monospace" font-size="10.5" fill="#a5d6ff">"Codeforces"</text>

    <text x="438" y="138" font-family="monospace" font-size="10.5" fill="#8b949e">  loc   </text>
    <text x="484" y="138" font-family="monospace" font-size="10.5" fill="#e6edf3">= </text>
    <text x="496" y="138" font-family="monospace" font-size="10.5" fill="#a5d6ff">"Dhaka, Bangladesh"</text>

    <text x="438" y="156" font-family="monospace" font-size="10.5" fill="#8b949e">  open  </text>
    <text x="484" y="156" font-family="monospace" font-size="10.5" fill="#e6edf3">= </text>
    <text x="496" y="156" font-family="monospace" font-size="10.5" fill="#a5d6ff">"new roles"</text>
    <rect x="546" y="145" width="7" height="12" rx="1" fill="#58a6ff" class="cursor"/>
  </g>
</svg>
